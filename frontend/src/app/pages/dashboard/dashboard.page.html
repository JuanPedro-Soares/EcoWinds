<section class="dashboard-grid">
  <div class="stats-grid">
    <app-stat-card
      label="Número de salas"
      [value]="stats.rooms.toString().padStart(3, '0')"
      icon="pi pi-building"
      [loading]="loadingStats"
    />
    <app-stat-card
      label="Número de microcontroladores"
      [value]="stats.devices.toString().padStart(3, '0')"
      icon="pi pi-microchip"
      [loading]="loadingStats"
    />
    <app-stat-card
      label="Número de agendamentos"
      [value]="stats.schedules.toString().padStart(3, '0')"
      icon="pi pi-calendar-clock"
      [loading]="loadingStats"
    />
  </div>

  @if (statsError) {
    <div class="dashboard-alert">
      <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
      <span>{{ statsError }}</span>
    </div>
  }

  <app-data-table
    title="Logs do sistema"
    subtitle="Últimas operações registradas pelo backend"
    searchPlaceholder="Busca indisponível no dashboard"
    emptyMessage="Nenhum log registrado até o momento."
    [columns]="logColumns"
    [rows]="logs"
    [loading]="loadingLogs"
    [error]="logsError"
    [showSearch]="false"
    [showCreateButton]="false"
    [totalElements]="logs.length"
    [totalPages]="logs.length ? 1 : 0"
    [page]="0"
    [pageSize]="10"
  />
</section>
